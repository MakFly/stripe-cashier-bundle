security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        better_auth_provider:
            id: BetterAuth\Symfony\Security\BetterAuthUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api/v1
            stateless: true
            provider: better_auth_provider
            custom_authenticators:
                - BetterAuth\Symfony\Security\BetterAuthAuthenticator

    access_control:
        - { path: ^/api/v1/auth/(register|login|login/2fa|refresh|logout|demo-users)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/magic-link/(send|verify|verify/.*)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/cart/guest, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/products, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/subscriptions/plans$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/errors, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/validation_errors, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/\.well-known/genid, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
