name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.*', '8.*']
        dependencies: ['lowest', 'highest']
        exclude:
          - php: '8.2'
            symfony: '8.*'
          - php: '8.3'
            symfony: '8.*'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl

      - name: Install dependencies
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}
        run: |
          if [ "${{ matrix.dependencies }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction --no-progress
          else
            composer update --prefer-dist --no-interaction --no-progress
          fi

      - name: Show resolved versions
        run: |
          php -v
          composer show symfony/framework-bundle --no-ansi | head -n 8
          composer show symfony/doctrine-bridge --no-ansi | head -n 8

      - name: Run tests
        run: |
          if [ "${{ matrix.dependencies }}" = "lowest" ]; then
            SYMFONY_DEPRECATIONS_HELPER=disabled ./vendor/bin/phpunit --configuration phpunit.xml
          else
            ./vendor/bin/phpunit --configuration phpunit.xml
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl

      - name: Install dependencies
        env:
          SYMFONY_REQUIRE: 7.*
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run quality checks
        run: composer quality

  tag_release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, quality]
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve next version
        id: version
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=head_already_tagged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_tag="$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)"
          if [ -z "$last_tag" ]; then
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          range="${last_tag}..HEAD"
          messages="$(git log --format=%B "$range")"
          bump="patch"

          if printf '%s' "$messages" | grep -Eq 'BREAKING CHANGE|^[^[:space:]]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s' "$messages" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          version="${last_tag#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          patch="${rest##*.}"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          echo "version=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Skip summary
        if: steps.version.outputs.skip == 'true'
        run: echo "No new tag created: ${{ steps.version.outputs.reason }}"
