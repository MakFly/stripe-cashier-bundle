name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag="$(git tag --list 'v*.*.*' --sort=-version:refname | sed -n '2p')"

          if [ -n "$prev_tag" ]; then
            {
              echo "CHANGES<<EOF"
              git log --pretty=format:"- %s (%h)" "${prev_tag}..HEAD"
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "CHANGES=Initial release" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGES }}

            ## Installation
            ```bash
            composer require makfly/stripe-cashier-bundle ${{ steps.get_version.outputs.VERSION }}
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: true
