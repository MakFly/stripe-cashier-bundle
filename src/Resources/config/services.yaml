# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    CashierBundle\:
        resource: '../../'
        exclude:
            - '../../Entity/'
            - '../../Command/'
            - '../../Resources/'
            - '../../Kernel.php'

    # Stripe Client Service
    Stripe\StripeClient:
        arguments:
            - '%cashier.secret%'
        public: false

    cashier.billable_service_locator:
        class: Symfony\Component\DependencyInjection\ServiceLocator
        arguments:
            -
                customer: '@CashierBundle\Service\CustomerService'
                subscription: '@CashierBundle\Service\SubscriptionService'
                payment_method: '@CashierBundle\Service\PaymentMethodService'
                invoice: '@CashierBundle\Service\InvoiceService'
                charge: '@CashierBundle\Service\PaymentService'
                checkout: '@CashierBundle\Service\CheckoutService'
                portal: '@CashierBundle\Service\CheckoutService'
                tax: '@CashierBundle\Service\TaxService'
        public: true

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    CashierBundle\Controller\:
        resource: '../../Controller/'
        tags: ['controller.service_arguments']

    # Webhook handlers
    CashierBundle\Webhook\:
        resource: '../../Webhook/'
        exclude: '../../Webhook/{WebhookController}'
        tags: ['cashier.webhook_handler']

    CashierBundle\Webhook\WebhookProcessor:
        arguments:
            $webhookSecret: '%cashier.webhook.secret%'
            $tolerance: '%cashier.webhook.tolerance%'

    CashierBundle\Middleware\VerifyWebhookSignatureMiddleware:
        arguments:
            $webhookSecret: '%cashier.webhook.secret%'
            $tolerance: '%cashier.webhook.tolerance%'

    # Invoice renderer
    CashierBundle\Contract\InvoiceRendererInterface:
        alias: CashierBundle\Service\InvoiceRenderer\DompdfInvoiceRenderer

    # Twig Extension
    CashierBundle\Twig\CashierExtension:
        tags: ['twig.extension']

    # Payment Controller with Stripe publishable key
    CashierBundle\Controller\PaymentController:
        arguments:
            $stripePublishableKey: '%cashier.key%'

    CashierBundle\Command\WebhookCommand:
        arguments:
            $webhookConfig: '%cashier.webhook%'
            $cashierPath: '%cashier.path%'
        tags: ['console.command']

    CashierBundle\Command\WebhookListenCommand:
        arguments:
            $webhookConfig: '%cashier.webhook%'
        tags: ['console.command']

    CashierBundle\Command\ReportUsageCommand:
        tags: ['console.command']

    CashierBundle\Command\CleanupExpiredSessionsCommand:
        tags: ['console.command']

    CashierBundle\Command\InstallCommand:
        tags: ['console.command']
